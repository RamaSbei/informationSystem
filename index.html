<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Crime Rate</title>
  </head>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .main-container {
      height: 100%;
      width: 100%;
      background-color: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1rem;
    }
    #header-ui {
      background-color: rgb(15, 15, 83);
      color: white;
      width: 50%;
    }
    #map {
      height: 500px;
      width: 500px;
    }
  </style>
  <body>
    <div class="main-container">
      <!-- Header -->
      <header id="header-ui" class="header-ui">
        <h2>Find crime rate</h2>
        <div>
          <input
            type="text"
            id="search-input"
            placeholder="Enter Street Location"
          />
          <button id="search-button" onclick="searchLocation()">Search</button>
        </div>
      </header>
      <!-- map -->
      <div id="map"></div>
    </div>
    <!-- leaflet map -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"
      integrity="sha512-OFs3W4DIZ5ZkrDhBFtsCP6JXtMEDGmhl0QPlmWYBJay40TT1n3gt2Xuw8Pf/iezgW9CdabjkNChRqozl/YADmg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script>
      var map = L.map("map").setView([51.46352, -2.583139], 10);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }).addTo(map);

      L.marker([51.505,-0.09]).addTo(map)

      let geoData;
      let layerGroup=L.layerGroup().addTo(map);

      fetch("Street_crime_incidents.geojson")
        .then((res) => res.json())
        .then((data) => {
          geoData = data;
          console.log("geo data", geoData);

          L.geoJSON(geoData, {
            onEachFeature: function (feature, layer) {
              layer.bindPopup(feature.properties.STREET_NAME);
            },
          // }).addTo(map);
          }).addTo(layerGroup);
        });

        // search location
        function searchLocation(){
          let searchInput=document.getElementById("search-input").value.toLowerCase();
          console.log("search input",searchInput);

        }
    </script>
  </body>
</html>
